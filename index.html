<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>電化營收獎金計算器</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .result { margin-top: 20px; padding: 15px; background: #eef7ee; border-left: 5px solid #4CAF50; border-radius: 4px; display: none; }
        .result p { margin: 5px 0; color: #333; }
        .highlight { font-size: 20px; color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>獎金試算系統</h2>
    <div class="input-group">
        <label for="revenueTenThousand">電化營收 (萬元)：</label>
        <input type="number" id="revenueTenThousand" value="22028">
    </div>
    <div class="input-group">
        <label for="deduct">扣除額 (元)：</label>
        <input type="number" id="deduct" value="125000000">
    </div>
    <div class="input-group">
        <label for="multiplier">每百萬乘以：</label>
        <input type="number" id="multiplier" value="153">
    </div>
    <button onclick="calculate()">開始計算</button>

    <div class="result" id="resultBox">
        <p>計算結論：</p>
        <p>應發獎金為：<span class="highlight" id="bonusResult">$0</span> 元</p>
    </div>
</div>

<script>
function calculate() {
    // 取得輸入數值（並將萬元的輸入值乘以 10,000 轉回元）
    const revenueInput = parseFloat(document.getElementById('revenueTenThousand').value) || 0;
    const revenue = revenueInput * 10000; 
    
    const deduct = parseFloat(document.getElementById('deduct').value) || 0;
    const multiplier = parseFloat(document.getElementById('multiplier').value) || 0;
    
    // 核心邏輯計算
    if (revenue <= deduct) {
        document.getElementById('bonusResult').innerText = "$0 (營收未達扣除額)";
    } else {
        const bonus = ((revenue - deduct) / 1000000) * multiplier;
        // 轉為千分位與小數點兩位
        document.getElementById('bonusResult').innerText = "$" + bonus.toLocaleString('zh-TW', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
    
    // 顯示結果框
    document.getElementById('resultBox').style.display = 'block';
}
</script>

</body>
</html>
